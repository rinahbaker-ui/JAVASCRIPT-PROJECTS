<!-- Declares this document as an HTML5 document -->
<!DOCTYPE html>

<!-- Begins the HTML document and sets the language to English -->
<html lang="en">

<!-- Begins the head section of the document -->
<head>

    <!-- Sets the character encoding to UTF-8 -->
    <meta charset="UTF-8">

    <!-- Sets the title that appears in the browser tab -->
    <title>Content</title>

<!-- Ends the head section -->
</head>

<!-- Begins the body section of the webpage -->
<body>

    <!-- Displays the main heading that will be loaded with AJAX -->
    <h2>This content was loaded via AJAX</h2>

    <!-- Displays the paragraph that will be loaded without refreshing the page -->
    <p>This content came from the content.html file and was fetched without refreshing the page.</p>

<!-- Ends the body section -->
</body>

<!-- Ends the HTML document -->
</html>
