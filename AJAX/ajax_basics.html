<!DOCTYPE html>

<!-- Defines the document as an HTML5 document -->
<html lang="en">

<head>

    <!-- Sets the character encoding to UTF-8 -->
    <meta charset="utf-8">

    <!-- Sets the title shown in the browser tab -->
    <title>Basic AJAX Demo</title>

    <!-- Connects the external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Main container for the page content -->
    <div class="container" id="content">

        <!-- Main page heading -->
        <h1>Sign up for our Newsletter</h1>

        <!-- Container for the form -->
        <div class="display">

            <!-- Begins the newsletter form -->
            <form>

                <!-- Text box for the user's name -->
                <input id="fullName" placeholder="Name">

                <!-- Text box for the user's email -->
                <input placeholder="Email">

                <!-- Button that displays a thank-you message -->
                <input type="button" class="btn" value="Submit" onclick="getMsg();">

                <!-- Button that loads content using AJAX -->
                <input type="button" class="btn" value="Load AJAX Message" onclick="loadContent();">

            </form>

            <!-- Paragraph where the AJAX content will be displayed -->
            <p id="demo">Click the button to load new content.</p>

        </div>

    </div>

    <!-- Begins the JavaScript section -->
    <script>

        // Creates a function that loads content from another HTML file
        function loadContent() {

            // Creates a new XMLHttpRequest object
            var xhttp = new XMLHttpRequest();

            // Runs whenever the request changes state
            xhttp.onreadystatechange = function () {

                // Checks if the request is complete and successful
                if (this.readyState == 4 && this.status == 200) {

                    // Replaces the paragraph with the content from content.html
                    document.getElementById("demo").innerHTML = this.responseText;
                }
            };

            // Opens a connection to the content.html file
            xhttp.open("GET", "content.html", true);

            // Sends the AJAX request
            xhttp.send();
        }

        // Creates a function that displays a thank-you message
        function getMsg() {

            // Shows an alert box when the Submit button is clicked
            alert("Thank you for signing up!");
        }

    </script>

</body>

</html>
